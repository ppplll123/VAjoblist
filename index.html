<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline — VA Review Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f0f0ec;
  --border: #e0ddd5;
  --text: #1a1a1a;
  --text2: #777770;
  --accent: #c8553a;
  --accent2: #b04530;
  --hot: #c8553a;
  --warm: #d4880f;
  --cool: #3a7cc8;
  --uae: #c8553a;
  --poland: #7c5cbf;
  --uk: #3a7cc8;
  --europe: #d4880f;
  --remote: #2a8f6a;
  --checked-bg: #f0f7f4;
  --checked-border: #2a8f6a33;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  backdrop-filter: blur(20px);
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.stat b { color: var(--text); }
.stat.checked b { color: var(--accent); }
.stats-bar {
  display: flex; gap: 24px; font-family: 'DM Mono', monospace; font-size: 13px;
}
.stat { color: var(--text2); }
.stat b { color: var(--text); font-size: 16px; }
.stat.checked b { color: var(--accent); }

/* Controls */
.controls {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 14px; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); font-weight: 600; }
.filter-btn .dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.search-box {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 14px; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  width: 220px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }
.spacer { flex: 1; }
.action-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 6px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.action-btn:hover { background: var(--accent2); }
.action-btn.outline {
  background: transparent; border: 1px solid var(--border);
  color: var(--text);
}
.action-btn.outline:hover { background: var(--surface2); }

/* Job list */
.job-list { padding: 8px 24px 100px; }
.job-row {
  display: grid;
  grid-template-columns: 50px 1fr 180px 140px 60px 80px;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: pointer;
}
.job-row:hover { background: var(--surface2); }
.job-row.checked { background: var(--checked-bg); border-color: var(--checked-border); }
/* checked state handled on .job-title-link */

/* Checkbox */
.check {
  width: 22px; height: 22px; border: 2px solid var(--border);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.check:hover { border-color: var(--accent); }
.check.on {
  background: var(--accent); border-color: var(--accent);
}
.check.on::after {
  content: '\2713'; color: #fff; font-size: 14px; font-weight: 700;
}

/* Job info */
.job-title-link {
  font-weight: 600; font-size: 14px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: block; color: var(--text); text-decoration: none;
}
.job-title-link:hover { color: var(--accent); text-decoration: underline; }
.job-row.checked .job-title-link { text-decoration: line-through; opacity: 0.5; color: var(--text2); }
.job-date { color: var(--text2); font-size: 11px; }
.easy-apply-tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace;
  background: #0a66c215; color: #0a66c2; border: 1px solid #0a66c233;
  margin-left: 6px; vertical-align: middle;
}
.job-company {
  font-size: 12px; color: var(--text2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.job-location {
  font-size: 12px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.region-tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
  text-transform: uppercase;
}
.region-tag.uae { background: #c8553a15; color: var(--uae); border: 1px solid #c8553a33; }
.region-tag.poland { background: #7c5cbf15; color: var(--poland); border: 1px solid #7c5cbf33; }
.region-tag.uk { background: #3a7cc815; color: var(--uk); border: 1px solid #3a7cc833; }
.region-tag.europe { background: #d4880f15; color: var(--europe); border: 1px solid #d4880f33; }
.region-tag.remote { background: #2a8f6a15; color: var(--remote); border: 1px solid #2a8f6a33; }

.score-bar {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
}
.score-hot { color: var(--hot); }
.score-warm { color: var(--warm); }
.score-cool { color: var(--cool); }

.job-link {
  font-size: 12px; color: var(--accent); text-decoration: none;
  font-family: 'DM Mono', monospace;
}
.job-link:hover { text-decoration: underline; }

/* Column header */
.col-header {
  display: grid;
  grid-template-columns: 50px 1fr 180px 140px 60px 80px;
  gap: 12px;
  padding: 8px 16px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'DM Mono', monospace;
  border-bottom: 2px solid var(--border);
  margin-bottom: 0;
  position: sticky; top: 110px; background: var(--bg); z-index: 50;
}
.col-header span { cursor: pointer; }
.col-header span:hover { color: var(--accent); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 12px 24px;
  border-radius: 8px; font-weight: 600; font-size: 14px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
}
.toast.show { opacity: 1; }

/* Empty state */
.empty {
  text-align: center; padding: 80px 24px; color: var(--text2);
  font-size: 16px;
}

/* Responsive */
@media (max-width: 900px) {
  .job-row, .col-header {
    grid-template-columns: 32px 1fr 100px 50px;
  }
  .job-location, .job-link { display: none; }
  .controls { gap: 4px; }
  .search-box { width: 150px; }
}
</style>
</head>

<div class="header">
  <div class="header-top">
    <div class="logo">Job Pipeline <span style="font-family:'Playfair Display',serif;font-style:italic;font-weight:700;color:var(--accent)">VA Review</span></div>
    <div class="stats-bar">
      <div class="stat">Total <b id="stat-total">0</b></div>
      <div class="stat checked">Checked <b id="stat-checked">0</b></div>
      <div class="stat">Remaining <b id="stat-remaining">0</b></div>
    </div>
  </div>
  <div class="controls">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="uae"><span class="dot" style="background:var(--uae)"></span>UAE</button>
    <button class="filter-btn" data-filter="poland"><span class="dot" style="background:var(--poland)"></span>Poland</button>
    <button class="filter-btn" data-filter="uk"><span class="dot" style="background:var(--uk)"></span>UK</button>
    <button class="filter-btn" data-filter="europe"><span class="dot" style="background:var(--europe)"></span>Europe</button>
    <button class="filter-btn" data-filter="remote"><span class="dot" style="background:var(--remote)"></span>Remote</button>
    <span style="color:var(--border)">|</span>
    <button class="filter-btn" data-filter="unchecked">Unchecked</button>
    <button class="filter-btn" data-filter="checked-only">Checked</button>
    <input class="search-box" placeholder="Search title, company..." id="search" />
    <span class="spacer"></span>
    <button class="action-btn outline" onclick="exportChecked()">Export Checked</button>
    <button class="action-btn" onclick="checkAll()">Check All Visible</button>
  </div>
</div>

<div class="job-list">

    <span onclick="toggleAllVisible()" title="VA Applied">VA</span>

    <span onclick="sortBy('region')">Region</span>
    <span onclick="sortBy('score')">Score</span>
    <span>Link</span>
  </div>
  <div id="jobs"></div>
</div>

<div class="toast" id="toast"></div>

let checkedIds = new Set();
let currentFilter = 'all';
let currentSearch = '';
let sortField = 'score';
let sortAsc = false;

// Load saved checks from localStorage
function loadChecks() {
  try {
    const saved = localStorage.getItem('job-pipeline-checks');
    if (saved) checkedIds = new Set(JSON.parse(saved));
  } catch(e) {}
}
// Auto-mark Easy Apply jobs as checked (Peter applies to those, not VA)
function prefillEasyApply() {
  let added = 0;
  JOBS.forEach(j => {
    if (j.easy_apply && !checkedIds.has(j.url)) {
      checkedIds.add(j.url);
      added++;
    }
  });
  if (added > 0) saveChecks();
}
function saveChecks() {
  localStorage.setItem('job-pipeline-checks', JSON.stringify([...checkedIds]));
}

function getFilteredJobs() {
  return JOBS.filter(j => {
    // Region filter
    if (currentFilter === 'unchecked') return !checkedIds.has(j.url);
    if (currentFilter === 'checked-only') return checkedIds.has(j.url);
    if (currentFilter !== 'all' && j.region.toLowerCase() !== currentFilter) return false;
    // Search filter
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.location.toLowerCase().includes(q);
    }
    return true;
  }).sort((a, b) => {
    let va = a[sortField], vb = b[sortField];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function render() {
  const container = document.getElementById('jobs');
  const filtered = getFilteredJobs();

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No jobs match your filters</div>';
  } else {
    container.innerHTML = filtered.map(j => {
      const isChecked = checkedIds.has(j.url);
      const scoreClass = j.score >= 0.97 ? 'score-hot' : j.score >= 0.93 ? 'score-warm' : 'score-cool';
      const regionClass = j.region.toLowerCase().replace('/', '');
      const posted = j.posted ? `<span class="job-date">${j.posted}</span>` : '';
      const eaTag = j.easy_apply ? '<span class="easy-apply-tag">Easy Apply</span>' : '';
      return `
        <div class="job-row ${isChecked ? 'checked' : ''}" data-url="${j.url}">
          <div class="check ${isChecked ? 'on' : ''}" onclick="toggleCheck(event, '${j.url.replace(/'/g, "\\'")}')"></div>
          <div>
            <a class="job-title-link" href="${j.url}" target="_blank">${esc(j.title)}${eaTag}</a>
            <div class="job-company">${esc(j.company)}${j.salary ? ' &bull; ' + esc(j.salary) : ''}${posted ? ' &bull; ' + posted : ''}</div>
          </div>
          <div class="job-location">${esc(j.location)}</div>
          <div><span class="region-tag ${regionClass}">${j.region}</span></div>
          <div class="score-bar ${scoreClass}">${j.score.toFixed(2)}</div>
          <div><a class="job-link" href="${j.url}" target="_blank" onclick="event.stopPropagation()">Open &rarr;</a></div>
        </div>`;
    }).join('');
  }
  updateStats(filtered);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toggleCheck(e, url) {
  e.stopPropagation();
  if (checkedIds.has(url)) checkedIds.delete(url);
  else checkedIds.add(url);
  saveChecks();
  render();
}

function updateStats(filtered) {
  document.getElementById('stat-total').textContent = filtered.length;
  const checked = filtered.filter(j => checkedIds.has(j.url)).length;
  document.getElementById('stat-checked').textContent = checked;
  document.getElementById('stat-remaining').textContent = filtered.length - checked;
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = field === 'title'; }
  render();
}

function toggleAllVisible() {
  const filtered = getFilteredJobs();
  const allChecked = filtered.every(j => checkedIds.has(j.url));
  filtered.forEach(j => {
    if (allChecked) checkedIds.delete(j.url);
    else checkedIds.add(j.url);
  });
  saveChecks();
  render();
}

function checkAll() {
  const filtered = getFilteredJobs();
  filtered.forEach(j => checkedIds.add(j.url));
  saveChecks();
  render();
  showToast(`Checked ${filtered.length} jobs`);
}

function exportChecked() {
  const checked = JOBS.filter(j => checkedIds.has(j.url));
  if (checked.length === 0) { showToast('No jobs checked yet'); return; }

  // CSV export
  const headers = ['Title', 'Company', 'Location', 'Region', 'Score', 'Salary', 'URL'];
  const rows = checked.map(j => [j.title, j.company, j.location, j.region, j.score, j.salary, j.url]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `checked-jobs-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast(`Exported ${checked.length} jobs as CSV`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

// Row click does nothing — only checkbox [v] marks as checked
document.getElementById('jobs').addEventListener('click', e => {
  // Only the checkbox toggles check state
  return;
});

// Keyboard: space to check focused
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    currentSearch = '';
    render();
  }
});

// Load data
loadChecks();
// After JOBS loads (in next script tag), prefillEasyApply + render are called
</script>
