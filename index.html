<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline — VA Review Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f0f0ec;
  --border: #e0ddd5;
  --text: #1a1a1a;
  --text2: #777770;
  --accent: #c8553a;
  --accent2: #b04530;
  --hot: #c8553a;
  --warm: #d4880f;
  --cool: #3a7cc8;
  --uae: #c8553a;
  --poland: #7c5cbf;
  --uk: #3a7cc8;
  --europe: #d4880f;
  --remote: #2a8f6a;
  --new-green: #16a34a;
  --checked-bg: #f5f5f3;
  --checked-border: #e0ddd5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─── Header ─── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px 0;
  backdrop-filter: blur(20px);
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.logo {
  font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
}
.logo .italic { color: var(--accent); font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; }
.batch-info {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
  margin-left: 12px; padding: 2px 8px; background: var(--surface2);
  border-radius: 4px; border: 1px solid var(--border);
}
.stats-bar {
  display: flex; gap: 20px; font-family: 'DM Mono', monospace; font-size: 13px;
}
.stat { color: var(--text2); }
.stat b { color: var(--text); font-size: 16px; }
.stat.new-stat b { color: var(--new-green); }
.stat.checked-stat b { color: var(--accent); }

/* ─── Workflow Tabs ─── */
.tabs {
  display: flex; gap: 0; margin-bottom: -1px;
}
.tab {
  padding: 10px 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent;
  border-bottom: 2px solid transparent;
  color: var(--text2); transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  background: none; border-radius: 6px 6px 0 0;
  display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active {
  color: var(--text); background: var(--surface);
  border: 1px solid var(--border); border-bottom-color: var(--surface);
}
.tab .count {
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 1px 7px; border-radius: 10px;
  background: var(--surface2); color: var(--text2);
}
.tab.active .count { background: var(--text); color: #fff; }
.tab.new-tab .count { background: var(--new-green); color: #fff; }
.tab.new-tab.active .count { background: var(--new-green); }
.tab.ea-tab .count { background: #0a66c2; color: #fff; }
.tab.ea-tab.active .count { background: #0a66c2; }

/* Pulse dot for new tab */
.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--new-green); position: relative;
}
.pulse-dot::after {
  content: ''; position: absolute; inset: -3px;
  border-radius: 50%; border: 2px solid var(--new-green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

/* ─── Controls ─── */
.controls-row {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.filter-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 5px 12px; border-radius: 5px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); font-weight: 600; }
.filter-btn .dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  margin-right: 5px; vertical-align: middle;
}
.search-box {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 5px 12px; border-radius: 5px;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  width: 200px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }
.spacer { flex: 1; }
.action-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 5px 14px; border-radius: 5px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.action-btn:hover { background: var(--accent2); }
.action-btn.outline {
  background: transparent; border: 1px solid var(--border); color: var(--text);
}
.action-btn.outline:hover { background: var(--surface2); }

/* ─── Job List ─── */
.job-list { padding: 0 24px 100px; }
.col-header {
  display: grid;
  grid-template-columns: 42px 1fr 170px 90px 55px 80px;
  gap: 10px;
  padding: 8px 14px;
  font-size: 10px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'DM Mono', monospace;
  border-bottom: 2px solid var(--border);
  position: sticky; top: 105px; background: var(--surface); z-index: 50;
}
.col-header span { cursor: pointer; }
.col-header span:hover { color: var(--accent); }

.job-row {
  display: grid;
  grid-template-columns: 42px 1fr 170px 90px 55px 80px;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.job-row:hover { background: var(--surface2); }

/* New job highlight */
.job-row.is-new {
  border-left: 3px solid var(--new-green);
  background: #f0fdf4;
}
.job-row.is-new:hover { background: #dcfce7; }
.new-badge {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  font-size: 9px; font-weight: 700; font-family: 'DM Mono', monospace;
  background: var(--new-green); color: #fff;
  margin-left: 6px; text-transform: uppercase; letter-spacing: 0.3px;
}

/* Checked/applied row */
.job-row.checked {
  background: var(--checked-bg); opacity: 0.65;
}
.job-row.checked .job-title-link {
  text-decoration: line-through; color: var(--text2);
}

/* ─── Checkbox ─── */
.check {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.check:hover { border-color: var(--accent); }
.check.on { background: var(--accent); border-color: var(--accent); }
.check.on::after { content: '\2713'; color: #fff; font-size: 13px; font-weight: 700; }

/* ─── Job Info ─── */
.job-title-link {
  font-weight: 600; font-size: 13px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: block; color: var(--text); text-decoration: none;
}
.job-title-link:hover { color: var(--accent); text-decoration: underline; }
.job-meta {
  font-size: 11px; color: var(--text2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.job-location {
  font-size: 11px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.region-tag {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace;
  text-transform: uppercase;
}
.region-tag.uae { background: #c8553a15; color: var(--uae); border: 1px solid #c8553a33; }
.region-tag.poland { background: #7c5cbf15; color: var(--poland); border: 1px solid #7c5cbf33; }
.region-tag.uk { background: #3a7cc815; color: var(--uk); border: 1px solid #3a7cc833; }
.region-tag.europe { background: #d4880f15; color: var(--europe); border: 1px solid #d4880f33; }
.region-tag.remote { background: #2a8f6a15; color: var(--remote); border: 1px solid #2a8f6a33; }

.score-bar { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
.score-hot { color: var(--hot); }
.score-warm { color: var(--warm); }
.score-cool { color: var(--cool); }

.easy-apply-tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 9px; font-weight: 600; font-family: 'DM Mono', monospace;
  background: #0a66c215; color: #0a66c2; border: 1px solid #0a66c233;
}
.ext-apply-tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 9px; font-weight: 600; font-family: 'DM Mono', monospace;
  background: #6b728015; color: #6b7280; border: 1px solid #6b728033;
}

/* ─── Section divider ─── */
.section-divider {
  padding: 14px 14px 8px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-divider .line { flex: 1; height: 1px; background: var(--border); }

/* ─── Mobile inline tags (hidden on desktop) ─── */
.mobile-tags { display: none; }

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 12px 24px;
  border-radius: 8px; font-weight: 600; font-size: 14px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
}
.toast.show { opacity: 1; }
.empty {
  text-align: center; padding: 60px 24px; color: var(--text2); font-size: 15px;
}

/* ─── Responsive ─── */
/* ─── Tablet ─── */
@media (max-width: 900px) {
  .job-row, .col-header { grid-template-columns: 32px 1fr 80px 60px; }
  .job-location, .score-bar { display: none; }
  .controls-row { gap: 4px; }
  .search-box { width: 130px; }
  .tab { padding: 8px 12px; font-size: 12px; }
}

/* ─── Mobile ─── */
@media (max-width: 500px) {
  .header { padding: 10px 12px 0; }
  .header-top {
    flex-direction: column; align-items: flex-start; gap: 6px;
    margin-bottom: 8px;
  }
  .logo { font-size: 17px; }
  .batch-info { font-size: 10px; margin-left: 8px; padding: 1px 6px; }
  .stats-bar {
    gap: 12px; font-size: 11px; width: 100%;
    justify-content: flex-start;
  }
  .stat b { font-size: 14px; }

  /* Scrollable tabs */
  .tabs {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; gap: 0; flex-wrap: nowrap;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 10px; font-size: 11px; white-space: nowrap; flex-shrink: 0;
  }
  .tab .count { font-size: 10px; padding: 1px 5px; }
  .pulse-dot { width: 6px; height: 6px; }

  /* Controls */
  .controls-row {
    padding: 8px 12px; gap: 4px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
  }
  .controls-row::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 4px 8px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .search-box { width: 120px; font-size: 11px; padding: 4px 8px; flex-shrink: 0; }
  .action-btn { padding: 4px 10px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }

  /* Column header — hide it on mobile, info is in the rows */
  .col-header { display: none; }

  /* Job rows — simplified 2-column layout */
  .job-list { padding: 0 8px 80px; }
  .job-row {
    grid-template-columns: 28px 1fr;
    gap: 8px; padding: 10px 8px;
  }
  .job-location, .region-tag, .score-bar { display: none; }

  /* Show region + score inline in meta */
  .job-title-link { font-size: 13px; }
  .job-meta { font-size: 10px; }
  .new-badge { font-size: 8px; padding: 1px 4px; }
  .easy-apply-tag, .ext-apply-tag { font-size: 8px; padding: 1px 4px; }

  /* Type column becomes inline */
  .job-row > div:nth-child(n+3) { display: none; }

  /* Show inline tags on mobile */
  .mobile-tags {
    display: inline-flex !important; gap: 4px; align-items: center; margin-left: 4px;
  }
  .mobile-tags .region-tag { display: inline-block !important; font-size: 9px; padding: 1px 5px; }
  .mobile-tags .easy-apply-tag,
  .mobile-tags .ext-apply-tag { display: inline-block !important; }
  .mobile-tags b { font-size: 10px; }

  .check { width: 24px; height: 24px; }
  .check.on::after { font-size: 14px; }

  .toast { font-size: 12px; padding: 8px 16px; bottom: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <span class="logo">Job Pipeline <span class="italic">VA Review</span></span>
      <span class="batch-info" id="batch-info">scraped: —</span>
    </div>
    <div class="stats-bar">
      <div class="stat new-stat">New <b id="stat-new">0</b></div>
      <div class="stat">VA <b id="stat-queue">0</b></div>
      <div class="stat" style="color:#0a66c2">EA <b id="stat-ea" style="color:#0a66c2">0</b></div>
      <div class="stat checked-stat">Done <b id="stat-applied">0</b></div>
      <div class="stat">Total <b id="stat-total">0</b></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab new-tab active" data-tab="new">
      <span class="pulse-dot"></span> New Today <span class="count" id="tab-new-count">0</span>
    </button>
    <button class="tab ea-tab" data-tab="easy_apply">
      Easy Apply <span class="count" id="tab-ea-count">0</span>
    </button>
    <button class="tab" data-tab="queue">
      VA Queue <span class="count" id="tab-queue-count">0</span>
    </button>
    <button class="tab" data-tab="applied">
      Applied <span class="count" id="tab-applied-count">0</span>
    </button>
    <button class="tab" data-tab="all">
      All <span class="count" id="tab-all-count">0</span>
    </button>
  </div>
</div>

<div class="controls-row">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="uae"><span class="dot" style="background:var(--uae)"></span>UAE</button>
  <button class="filter-btn" data-filter="poland"><span class="dot" style="background:var(--poland)"></span>Poland</button>
  <button class="filter-btn" data-filter="uk"><span class="dot" style="background:var(--uk)"></span>UK</button>
  <button class="filter-btn" data-filter="europe"><span class="dot" style="background:var(--europe)"></span>Europe</button>
  <button class="filter-btn" data-filter="remote"><span class="dot" style="background:var(--remote)"></span>Remote</button>
  <span style="color:var(--border)">|</span>
  <button class="filter-btn" data-filter="easy_apply">Easy Apply</button>
  <button class="filter-btn" data-filter="external">External</button>
  <input class="search-box" placeholder="Search title, company..." id="search" />
  <span class="spacer"></span>
  <button class="action-btn outline" onclick="exportChecked()">Export CSV</button>
  <button class="action-btn" onclick="checkAllVisible()">Mark All Applied</button>
</div>

<div class="job-list">
  <div class="col-header">
    <span onclick="toggleAllVisible()" title="Mark all as applied">VA</span>
    <span onclick="sortBy('title')">Title / Company</span>
    <span onclick="sortBy('location')">Location</span>
    <span onclick="sortBy('region')">Region</span>
    <span onclick="sortBy('score')">Score</span>
    <span onclick="sortBy('easy_apply')">Type</span>
  </div>
  <div id="jobs"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let JOBS = [];
let checkedIds = new Set();
let currentTab = 'new';
let currentFilter = 'all';
let currentSearch = '';
let sortField = 'score';
let sortAsc = false;

// ─── Persistence ───
function loadChecks() {
  try {
    const saved = localStorage.getItem('job-pipeline-checks');
    if (saved) checkedIds = new Set(JSON.parse(saved));
  } catch(e) {}
}
function saveChecks() {
  localStorage.setItem('job-pipeline-checks', JSON.stringify([...checkedIds]));
}

// No auto-marking — Easy Apply jobs stay in their own tab for Peter
function prefillEasyApply() {
  // intentionally empty — Peter marks these manually after applying
}

// ─── Batch detection ───
function getLatestBatch() {
  const dates = [...new Set(JOBS.map(j => j.scraped_at).filter(Boolean))].sort().reverse();
  return dates[0] || null;
}

function isNewJob(j) {
  return j.scraped_at === getLatestBatch();
}

// ─── Filtering ───
function getFilteredJobs() {
  const latestBatch = getLatestBatch();

  return JOBS.filter(j => {
    // Tab filter
    const isChecked = checkedIds.has(j.url);
    const isNew = j.scraped_at === latestBatch && !isChecked;
    const isEA = !!j.easy_apply;

    if (currentTab === 'new' && (!isNew || isEA)) return false;         // New external jobs only
    if (currentTab === 'easy_apply' && (!isEA || isChecked)) return false; // Unchecked Easy Apply
    if (currentTab === 'queue' && (isNew || isChecked || isEA)) return false; // Old external unchecked
    if (currentTab === 'applied' && !isChecked) return false;            // All checked
    // 'all' shows everything

    // Region / type filter
    if (currentFilter === 'easy_apply' && !j.easy_apply) return false;
    if (currentFilter === 'external' && j.easy_apply) return false;
    if (!['all', 'easy_apply', 'external'].includes(currentFilter) && j.region.toLowerCase() !== currentFilter) return false;

    // Search
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.location.toLowerCase().includes(q);
    }
    return true;
  }).sort((a, b) => {
    // New jobs always sort by score desc first
    if (currentTab === 'new') {
      return b.score - a.score;
    }
    let va = a[sortField], vb = b[sortField];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ─── Render ───
function render() {
  const container = document.getElementById('jobs');
  const filtered = getFilteredJobs();
  const latestBatch = getLatestBatch();

  if (filtered.length === 0) {
    const msgs = {
      'new': 'No new jobs in the latest batch. Run the scraper!',
      'queue': 'Queue is empty — all jobs have been reviewed.',
      'applied': 'No jobs marked as applied yet.',
      'all': 'No jobs match your filters.'
    };
    container.innerHTML = `<div class="empty">${msgs[currentTab] || msgs.all}</div>`;
  } else {
    container.innerHTML = filtered.map(j => {
      const isChecked = checkedIds.has(j.url);
      const isNew = j.scraped_at === latestBatch && !isChecked;
      const scoreClass = j.score >= 0.97 ? 'score-hot' : j.score >= 0.93 ? 'score-warm' : 'score-cool';
      const regionClass = j.region.toLowerCase().replace('/', '');
      const typeLabel = j.easy_apply ? '<span class="easy-apply-tag">Easy Apply</span>' : '<span class="ext-apply-tag">External</span>';
      const newBadge = isNew ? '<span class="new-badge">new</span>' : '';
      const posted = j.posted ? j.posted : '';
      const meta = [j.company, j.salary, posted].filter(Boolean).join(' \u2022 ');
      const mobileScore = j.score >= 0.95 ? `<b class="${scoreClass}">${j.score.toFixed(2)}</b>` : '';
      const mobileTags = `<span class="mobile-tags"><span class="region-tag ${regionClass}">${j.region}</span>${mobileScore}${typeLabel}</span>`;

      return `
        <div class="job-row ${isChecked ? 'checked' : ''} ${isNew ? 'is-new' : ''}">
          <div class="check ${isChecked ? 'on' : ''}" onclick="toggleCheck(event, '${j.url.replace(/'/g, "\\'")}')"></div>
          <div>
            <a class="job-title-link" href="${j.url}" target="_blank">${esc(j.title)}${newBadge}</a>
            <div class="job-meta">${esc(meta)}${mobileTags}</div>
          </div>
          <div class="job-location">${esc(j.location)}</div>
          <div><span class="region-tag ${regionClass}">${j.region}</span></div>
          <div class="score-bar ${scoreClass}">${j.score.toFixed(2)}</div>
          <div>${typeLabel}</div>
        </div>`;
    }).join('');
  }
  updateStats();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Actions ───
function toggleCheck(e, url) {
  e.stopPropagation();
  if (checkedIds.has(url)) checkedIds.delete(url);
  else checkedIds.add(url);
  saveChecks();
  render();
}

function updateStats() {
  const latestBatch = getLatestBatch();
  const newJobs = JOBS.filter(j => j.scraped_at === latestBatch && !checkedIds.has(j.url) && !j.easy_apply);
  const eaJobs = JOBS.filter(j => j.easy_apply && !checkedIds.has(j.url));
  const applied = JOBS.filter(j => checkedIds.has(j.url));
  const queue = JOBS.filter(j => j.scraped_at !== latestBatch && !checkedIds.has(j.url) && !j.easy_apply);

  document.getElementById('stat-new').textContent = newJobs.length;
  document.getElementById('stat-queue').textContent = queue.length;
  document.getElementById('stat-ea').textContent = eaJobs.length;
  document.getElementById('stat-applied').textContent = applied.length;
  document.getElementById('stat-total').textContent = JOBS.length;

  document.getElementById('tab-new-count').textContent = newJobs.length;
  document.getElementById('tab-ea-count').textContent = eaJobs.length;
  document.getElementById('tab-queue-count').textContent = queue.length;
  document.getElementById('tab-applied-count').textContent = applied.length;
  document.getElementById('tab-all-count').textContent = JOBS.length;

  // Batch info
  if (latestBatch) {
    document.getElementById('batch-info').textContent = `scraped: ${latestBatch}`;
  }

  // Hide pulse dot if no new jobs
  const dot = document.querySelector('.pulse-dot');
  if (dot) dot.style.display = newJobs.length > 0 ? 'block' : 'none';
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = field === 'title'; }
  render();
}

function toggleAllVisible() {
  const filtered = getFilteredJobs();
  const allChecked = filtered.every(j => checkedIds.has(j.url));
  filtered.forEach(j => {
    if (allChecked) checkedIds.delete(j.url);
    else checkedIds.add(j.url);
  });
  saveChecks();
  render();
}

function checkAllVisible() {
  const filtered = getFilteredJobs();
  filtered.forEach(j => checkedIds.add(j.url));
  saveChecks();
  render();
  showToast(`Marked ${filtered.length} jobs as applied`);
}

function exportChecked() {
  const checked = JOBS.filter(j => checkedIds.has(j.url));
  if (checked.length === 0) { showToast('No jobs checked yet'); return; }
  const headers = ['Title', 'Company', 'Location', 'Region', 'Score', 'Easy Apply', 'Posted', 'Scraped', 'URL'];
  const rows = checked.map(j => [j.title, j.company, j.location, j.region, j.score, j.easy_apply, j.posted, j.scraped_at, j.url]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `applied-jobs-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast(`Exported ${checked.length} jobs as CSV`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Event Listeners ───

// Tab buttons
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    currentSearch = '';
    render();
  }
});

// ─── Init ───
loadChecks();
</script>
<script src="jobs-data.js"></script>
</body>
</html>
